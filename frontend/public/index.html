<!DOCTYPE html>
<html lang="hi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#c80d0d" />
    <meta name="description" content="CareCell Network - Cancer Patient Digital Companion for India" />
    <meta name="keywords" content="cancer, patient, india, hindi, blood donor, oncology, treatment tracker" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Noto+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Noto+Sans+Devanagari:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <title>CareCell Network - कैंसर केयर साथी</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: 'Noto Sans', 'Noto Sans Devanagari', sans-serif; background: #fafafa; }
      #root { min-height: 100vh; }
      .loading-screen {
        position: fixed; inset: 0; background: linear-gradient(135deg, #c80d0d 0%, #881414 100%);
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        z-index: 9999; transition: opacity 0.5s;
      }
      .loading-logo { font-family: 'Baloo 2', sans-serif; font-size: 2.5rem; font-weight: 800; color: white; margin-bottom: 8px; }
      .loading-sub { color: rgba(255,255,255,0.8); font-size: 1rem; margin-bottom: 32px; }
      .loading-bar { width: 200px; height: 3px; background: rgba(255,255,255,0.3); border-radius: 2px; overflow: hidden; }
      .loading-bar-inner { height: 100%; background: white; border-radius: 2px; animation: loadBar 1.5s ease-in-out infinite; }
      @keyframes loadBar { 0% { width: 0%; margin-left: 0; } 50% { width: 70%; margin-left: 15%; } 100% { width: 0%; margin-left: 100%; } }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run CareCell Network.</noscript>
    <div id="root">
      <div class="loading-screen" id="loading">
        <div class="loading-logo">🏥 CareCell</div>
        <div class="loading-sub">कैंसर केयर साथी</div>
        <div class="loading-bar"><div class="loading-bar-inner"></div></div>
      </div>
    </div>
    <script>
      window.addEventListener('load', () => {
        setTimeout(() => {
          const el = document.getElementById('loading');
          if (el) { el.style.opacity = '0'; setTimeout(() => el.remove(), 500); }
        }, 800);
      });
    </script>
  </body>
</html>
